name: MobileCommander
options:
  bundleIdPrefix: com.commander
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_CFBundleDisplayName: "Commander"

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  MobileCommander:
    type: application
    platform: iOS
    sources:
      - path: MobileCommander
    resources:
      - path: MobileCommander/Assets.xcassets
      - path: MobileCommander/GoogleService-Info.plist
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.commander.mobile
        INFOPLIST_KEY_CFBundleDisplayName: "Commander"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
    info:
      path: MobileCommander/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(REVERSED_CLIENT_ID)
        GIDClientID: "YOUR_GOOGLE_CLIENT_ID"
        REVERSED_CLIENT_ID: "com.googleusercontent.apps.YOUR_CLIENT_ID"
